<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Todo</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center text-primary mb-4">📝 To-Do List</h1>

    <!-- Ошибки -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Форма -->
    <form action="/add" method="post" class="mb-4">
        <div class="input-group">
            <input type="text" name="title" class="form-control" placeholder="Что нужно сделать?">
            <button class="btn btn-success">Добавить</button>
        </div>
    </form>

    <!-- Список -->
    <ul class="list-group shadow-sm">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">

            <div>
                <input type="checkbox"
                       {% if task[2] %}checked{% endif %}
                       onclick="document.getElementById('toggle-{{ task[0] }}').submit()">

                <span style="{{ 'text-decoration: line-through; color: gray;' if task[2] else '' }}">
                    {{ task[1] }}
                </span>
            </div>

            <div>
                <form id="toggle-{{ task[0] }}" action="/toggle/{{ task[0] }}" method="post" class="d-inline"></form>

                <form action="/delete/{{ task[0] }}" method="post" class="d-inline"
                      onsubmit="return confirm('Удалить?')">
                    <button class="btn btn-sm btn-danger">🗑</button>
                </form>
            </div>

        </li>
        {% else %}
        <li class="list-group-item text-center text-muted">
            Нет задач 😴
        </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
